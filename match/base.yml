# espanso match file

# For a complete introduction, visit the official docs at: https://espanso.org/docs/

# You can use this file to define the base matches (aka snippets)
# that will be available in every application when using espanso.

# Matches are substitution rules: when you type the "trigger" string
# it gets replaced by the "replace" string.

# yaml-language-server: $schema=https://raw.githubusercontent.com/espanso/espanso/dev/schemas/match.schema.json

matches:
  # Simple text replacement
  - trigger: ":espanso"
    replace: "Hi there!"

  # NOTE: espanso uses YAML to define matches, so pay attention to the indentation!

  # But matches can also be dynamic:

  # Print the current date
  - trigger: ":date"
    replace: "{{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%Y-%m-%d"

  # Print the output of a shell command
  - trigger: ":shell"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "echo 'Hello from your shell'"
          
  # And much more! For more information, visit the docs: https://espanso.org/docs/

  - trigger: ":@1"
    replace: "①"
  - trigger: ":@2"
    replace: "②"
  - trigger: ":@3"
    replace: "③"
  - trigger: ":@4"
    replace: "④"
  - trigger: ":@5"
    replace: "⑤"
  - trigger: ":@6"
    replace: "⑥"
  - trigger: ":@7"
    replace: "⑦"
  - trigger: ":@8"
    replace: "⑧"
  - trigger: ":@9"
    replace: "⑨"
  - trigger: ":@0"
    replace: "⑩"
  - trigger: ":circle"
    replace: "○"
  - trigger: ":ooo"
    replace: "○"
  - trigger: ":fcircle"
    replace: "●"
  - trigger: ";ooo"
    replace: "●"
  - trigger: ":box"
    replace: "□"
  - trigger: ":bbb"
    replace: "□"
  - trigger: ":fbox"
    replace: "■"
  - trigger: ";bbb"
    replace: "■"
  - trigger: ":star"
    replace: "☆"
  - trigger: ":sss"
    replace: "☆"
  - trigger: ":fstar"
    replace: "★"
  - trigger: ";sss"
    replace: "★"

  - trigger: ":수사결과보고"
    replace: |
      가. 인정되는 사실
      나. 쟁점
      다. 관련 법리
      라. 검토
      마. 의견
    
  - trigger: ":qna"
    replace: "문 : $|$\n답 : "
    
  - trigger: ":입건전조사종결(죄가안됨)"
    replace: |
      [입건전조사결과보고서]
      죄가 되지 아니하여 입건전조사 종결(죄가안됨) 하고자 합니다.
      
      [결정서 결과]
      입건전조사종결(죄가안됨)
      
      [불입건이유]
      피조사자는 범행 당시 12세의 형사미성년자여서 죄가 되지 아니한다.
      입건전조사 종결한다.
    
  - trigger: ":입건전조사종결(혐의없음-범죄인정안됨)"
    replace: |
      [입건전조사결과보고서]
      범죄가 인정되지 아니하여 입건전조사 종결(혐의없음) 하고자 합니다.
      
      [결정서 결과]
      입건전조사종결(혐의없음)
      
      [불입건이유]
      ~ 행위에 대하여 처벌하는 규정이 없어 범죄가 되지 않는다.
      입건전조사 종결한다.
      
  - trigger: ":입건전조사종결(혐의없음-증거불충분)"
    replace: |
      [입건전조사결과보고서]
      증거 불충분하여 입건전조사 종결(혐의없음) 하고자 합니다.
      
      [결정서 결과]
      입건전조사종결(혐의없음)
      
      [불입건이유]
      ~이를 인정할 만한 자료가 없어 증거가 불충분하여 범죄혐의가 없다.
      입건전조사 종결한다.
      
  - trigger: ":입건전조사종결(공소권없음)"
    replace: |
      [입건전조사결과보고서]
      처벌의사 없어 입건전조사 종결(공소권없음) 하고자 합니다.
      
      [결정서 결과]
      입건전조사종결(공소권없음)
      
      [불입건이유]
      피조사자는 피해자의 처벌의사 없어 공소권 없다.
      입건전조사 종결한다.
    
  - trigger: ":입건전조사중지(피혐의자중지)"
    replace: |
      [입건전조사결과보고서]
      피혐의자의 소재가 발견될 때까지 입건전조사 중지(피혐의자 중지)하고자 합니다.
      
      [결정서 결과]
      입건전조사중지(피혐의자중지)
      
      [불입건이유]
      피혐의자는 현재 소재불명이다. 
      피혐의자의 소재가 발견될 때까지 입건전조사 중지한다.
      
  - trigger: ":입건전조사중지(참고인중지)"
    replace: |
      [입건전조사결과보고서]
      참고인의 소재가 발견될 때까지 입건전조사 중지(참고인중지)하고자 합니다.
      
      [결정서 결과]
      입건전조사중지(참고인중지)
      
      [불입건이유]
      참고인은 현재 소재불명이다. 
      참고인의 소재가 발견될 때까지 입건전조사 중지한다.
    
  - trigger: ":입건전조사종결(공람 후 종결)"
    replace: |
      [입건전조사결과보고서]
      {처벌을 희망하는 의사표시가 취소}되어 공람 후 종결하고자 합니다.
      
      [결정서 결과]
      공람 후 종결
      
      [불입건이유]
      {처벌을 희망하는 의사표시가 취소}되었다.
      경찰수사규칙 제19조 제2항 제5호 {차}목의 공람 후 종결 사유에 해당하여 공람 후 종결한다.
      
      [경찰수사규칙 제19조 제2항 제5호]
      가. 같은 내용으로 3회 이상 반복하여 접수되고 2회 이상 그 처리 결과를 통지한 사건과 같은 내용인 경우
      나. 이름을 적지 않거나 또는 거짓 이름으로 접수된 경우
      다. 단순한 풍문이나 인신공격적인 내용인 경우
      라. 완결된 사건 또는 재판에 불복하는 내용인 경우
      마. 민사소송 또는 행정소송에 관한 사항인 경우
      바. 본인의 진정한 의사에 의한 것인지 여부가 확인되지 않은 경우
      사. 내용이 불분명하거나 구체적 사실이 적시되어 있지 않은 경우
      아. 특정사건과 관련 없는 청원 또는 정책건의를 내용으로 하는 경우
      자. 동일한 사실에 관하여 고소 또는 고발이 있는 경우
      차. 처벌을 희망하는 의사표시가 없거나 처벌을 희망하는 의사표시가 취소된 경우
    
  - trigger: ":불송치(혐의없음-증거불충분)"
    replace: |
      [대표 유형]
      1. 고소인 주장만 있고 객관자료가 부족한 경우
      2. 피의자의 변소에 부합하는 객관자료가 있는 경우
      3. 목격자 진술이 피의자 주장과 일치하는 경우
      4. 고소인 진술의 신빙성이 낮은 경우
      5. 범의, 고의, 공모, 인과관계 등 주관적·규범적 요소를 인정하기 부족한 경우
      
      [기본 패턴]
       - 피의자가 [외형적 행위]한 사실은 인정된다.
       - 고소인은 피의자가 [범죄 성립에 필요한 핵심 사실]을 하였다고 주장한다.
       - 피의자는 [범죄 성립을 부정하는 사정]이라고 주장하고, [증거명]도 피의자의 주장과 일치한다.
       - 고소인의 주장만으로는 피의사실을 인정하기에 부족하고 달리 이를 인정할 증거가 없다.
       - 증거 불충분하여 혐의 없다.
      
      [기본 패턴 — 전부 부인형]
       - 고소인은 피의자가 [피의사실]을 하였다고 주장한다.
       - 피의자는 [알리바이 또는 범행 부인 사유]를 들어 피의사실을 부인하고, [증거명]도 피의자의 주장과 일치한다.
       - [고소인 진술의 신빙성을 낮추는 사정]에 비추어 보면, 고소인의 주장만으로는 피의사실을 인정하기에 부족하고 달리 이를 인정할 증거가 없다.
       - 증거 불충분하여 혐의 없다.
       
      [사기 사건형]
       - 피의자가 고소인으로부터 금원을 교부받고 이를 변제하지 않은 사실은 인정된다.
       - 고소인은 피의자가 처음부터 변제할 의사나 능력 없이 금원을 차용하였다고 주장한다.
       - 피의자는 차용 당시에는 변제할 의사와 능력이 있었으나 이후 사업 부진 등 사정으로 변제하지 못한 것이라고 주장하고, [거래내역, 이자 지급 내역, 참고인 진술 등]도 피의자의 주장과 일치한다.
       - 피의자가 원금과 이자를 지급하지 않았다는 사실만으로는 피의자에게 편취의 범의가 있었다고 인정하기에 부족하고 달리 이를 인정할 증거가 없다.
       - 증거 불충분하여 혐의 없다.
        
      [횡령 사건형]
       - 피의자가 고소인으로부터 금원을 교부받은 사실은 인정된다.
       - 고소인은 피의자가 위 금원을 임의로 소비하여 횡령하였다고 주장한다.
       - 피의자는 위 금원을 [약정 목적]에 따라 사용하였다고 주장하고, [계좌거래내역, 영수증, 투자내역 등]도 피의자의 주장과 일치한다.
       - 고소인의 주장만으로는 피의자가 보관 중인 타인의 재물을 임의로 처분하였거나 불법영득의사를 가지고 있었다고 인정하기에 부족하고 달리 이를 인정할 증거가 없다.
       - 증거 불충분하여 혐의 없다.
          
      [배임 사건형]
        - 피의자가 [계약 또는 사무처리 관계]에 있었던 사실은 인정된다.
        - 고소인은 피의자가 임무에 위배하여 고소인에게 손해를 가하였다고 주장한다.
        - 피의자는 [임무위배가 아니라는 사정]이라고 주장하고, [계약서, 규약, 참고인 진술, 금융자료 등]도 피의자의 주장과 일치한다.
        - 고소인의 주장만으로는 피의자가 임무를 위반한 사실을 인정하기에 부족하고 달리 이를 인정할 증거가 없다.
        - 증거 불충분하여 혐의 없다.
   
  - trigger: ":불송치(혐의없음-범죄인정안됨)"
    replace: |
      [대표 유형]
        1. 공연성 없음
        2. 객체가 범죄의 객체에 해당하지 않음
        3. 불가벌적 사후행위
        4. 행사 목적 없음
        5. 증인 지위가 아님
        6. 처벌규정 없음
        7. 다른 죄에 흡수되어 별죄가 성립하지 않음
      
      [기본 패턴]
        - 피의자가 [외형적 행위]한 사실은 인정된다.
        - 그러나 [구성요건 흠결 사유]가 인정된다.
        - 범죄 인정되지 아니하여 혐의 없다.
      
      [공연성 부재형]
        - 피의자가 고소인에게 [발언 내용]을 말한 사실은 인정된다.
        - 한편 피의자가 위와 같이 말할 당시 피의자와 고소인 이외에는 아무도 없었고, 다른 사람이 들을 수 있는 상태가 아니었으므로 공연성을 인정할 수 없다.
        - 범죄 인정되지 아니하여 혐의 없다.
       
      [객체 부적격형]
         - 피의자가 피해자의 컴퓨터에 저장된 문서 파일을 전송한 사실은 인정된다.
         - 그러나 컴퓨터에 저장된 정보는 절도죄의 대상이 되는 재물이라고 할 수 없다.
         - 범죄 인정되지 아니하여 혐의 없다.

  - trigger: ":불송치이유작성의공통구조"
    replace: |
      1. 인정되는 외형 사실 
      2. 고소인 또는 피해자 주장 
      3. 피의자 주장 
      4. 피의자 주장에 부합하는 증거 
      5. 고소인 주장 또는 피의사실 인정이 부족한 이유 
      6. 결론 
      
  - trigger: ":AI수결"
    replace: |
      지식 베이스에서 'AI용_수사결과보고서 작성방법 교재.md', 'AI용_수사결과보고서_작성_매뉴얼_v3.2.md'를 참고해서, 수사결과보고서 초안을 작성해줘. 작성하기 전 나에게 물어볼 것이 있으면 물어봐.
      
      
  - trigger: ":AI수결재검토"
    replace: |
      지식 베이스에서 'AI용_수사결과보고서 작성방법 교재.md', 'AI용_수사결과보고서_작성_매뉴얼_v3.2.md'를 참고해서, 각 항목별 작성 원칙이 잘 준수되었는지, 수정이 필요한 부분이 있는지 검토해줘.
      
      